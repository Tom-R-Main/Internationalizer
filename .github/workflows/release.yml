name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PKG_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "package.json version ${PKG_VERSION} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Verify platform package versions
        run: node ./scripts/check-npm-package-versions.mjs

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        run: go test ./...

      - name: Run npm wrapper tests
        run: node --test test/npm-wrapper.test.cjs

      - name: Verify npm package contents
        run: npm pack --dry-run

  publish-platform:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_dir: packages/darwin-arm64
            goos: darwin
            goarch: arm64
            binary_name: internationalizer
          - package_dir: packages/darwin-x64
            goos: darwin
            goarch: amd64
            binary_name: internationalizer
          - package_dir: packages/linux-arm64
            goos: linux
            goarch: arm64
            binary_name: internationalizer
          - package_dir: packages/linux-x64
            goos: linux
            goarch: amd64
            binary_name: internationalizer
          - package_dir: packages/win32-x64
            goos: windows
            goarch: amd64
            binary_name: internationalizer.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PKG_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "package.json version ${PKG_VERSION} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Build platform binary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p "${{ matrix.package_dir }}/bin"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${{ matrix.package_dir }}/bin/${{ matrix.binary_name }}" ./cmd/internationalizer

      - name: Publish platform package
        working-directory: ${{ matrix.package_dir }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm:
    needs: publish-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PKG_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "package.json version ${PKG_VERSION} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Publish npm package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
